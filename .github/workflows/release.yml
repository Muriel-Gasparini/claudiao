name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Test with coverage
        run: go test -race -coverprofile=coverage.out ./...

      - name: Enforce coverage floor (80% total + per-package)
        run: |
          go tool cover -func=coverage.out > /tmp/cov.txt
          total=$(awk '/^total:/ {print $3}' /tmp/cov.txt | tr -d '%')
          echo "total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { if (t+0 < 80) { print "::error::total coverage " t "% is below 80% floor"; exit 1 } }'
          fail=0
          for pkg in $(go list ./... | grep -v '^$'); do
            pct=$(go test -count=1 -cover "$pkg" 2>/dev/null | awk '/coverage:/ {gsub("%","",$5); print $5}')
            if [ -z "$pct" ]; then
              continue
            fi
            echo "  $pkg: $pct%"
            awk -v p="$pct" -v pkg="$pkg" 'BEGIN { if (p+0 < 80) { print "::error::" pkg " coverage " p "% is below 80% floor"; exit 1 } }' || fail=1
          done
          if [ $fail -ne 0 ]; then exit 1; fi

  goreleaser:
    name: Build & publish
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
